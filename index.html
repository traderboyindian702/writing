<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Oxanium',sans-serif;
    background:url('https://i.ibb.co/7x4vqZqd/image.jpg') no-repeat center center;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Mobile Container */
.glass-box{
    width:100%;
    max-width:390px;
    min-height:100vh;

    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    padding:25px 20px;
}

.logo-img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #ffdb4d;
    box-shadow:0 0 18px #ffdb4d;
    object-fit:cover;
    margin-bottom:18px;
}

.title{
    color:#ffdb4d;
    font-size:30px;
    font-weight:700;
    text-shadow:0 0 15px #ffdb4d;
    margin-bottom:8px;
}

.sub-title{
    color:#ffe26f;
    font-size:18px;
    margin-bottom:25px;
}

.join-btn{
    width:100%;
    padding:16px;
    text-decoration:none;
    color:#fff;
    font-size:18px;
    font-weight:700;

    border-radius:12px;
    background:linear-gradient(90deg,#0088cc,#00a8ff);

    box-shadow:0 0 15px #00a8ff;

    animation:pulse 1.8s infinite;
    margin-bottom:20px;
}

.join-btn:hover{
    transform:scale(1.03);
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(.95);}
100%{transform:scale(1);}
}

.highlight{
    color:#ffdb4d;
    border:1px solid #ffdb4d;
    padding:8px 14px;
    border-radius:8px;
    margin:15px 0;
    box-shadow:0 0 12px rgba(255,219,77,.4);
}

p{
    color:#fff;
    font-size:16px;
    margin:6px 0;
}

footer{
    margin-top:18px;
    font-size:12px;
    color:#ccc;
}

.ads{
    margin-top:20px;
    background:linear-gradient(135deg,#4f46e5,#9333ea,#ec4899);
    padding:10px 14px;
    border-radius:10px;
    color:#fff;
    font-size:13px;
    box-shadow:0 0 15px rgba(0,0,0,.3);
    animation:glow 2s infinite alternate;
}

.ads a{
    color:#7cc5ff;
    text-decoration:none;
    font-weight:700;
}

@keyframes glow{
from{box-shadow:0 0 8px #9333ea;}
to{box-shadow:0 0 18px #ec4899;}
}
</style>

</head>
